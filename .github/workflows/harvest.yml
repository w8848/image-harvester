name: harvest
on:
  workflow_dispatch:
    inputs:
      total:
        description: number of shards
        default: "30"
jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: [25,26,27,28,29]
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips42 libvips-tools
          pip install -q pyvips boto3 requests pillow
      - name: run shard
        env:
          EDGE_PROXY: ${{ secrets.EDGE_PROXY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY: ${{ secrets.R2_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_D1_DB: ${{ secrets.CF_D1_DB }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
          LIST_BUCKET: ${{ secrets.LIST_BUCKET }}
          LIST_KEY: ${{ secrets.LIST_KEY }}
          DST_BUCKET: ${{ secrets.DST_BUCKET }}
          LIB_NAME: ${{ secrets.LIB_NAME }}
        run: python worker.py --shard ${{ matrix.shard }} --total ${{ github.event.inputs.total }}
